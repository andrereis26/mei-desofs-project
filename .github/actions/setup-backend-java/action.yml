name: setup-backend-java
description: Set up Java and Maven caching for backend CI jobs.

inputs:
  java-version:
    description: Java version to install.
    required: false
    default: "17"
  distribution:
    description: Java distribution to install.
    required: false
    default: temurin

runs:
  using: composite
  steps:
    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        distribution: ${{ inputs.distribution }}
        java-version: ${{ inputs.java-version }}
        cache: maven