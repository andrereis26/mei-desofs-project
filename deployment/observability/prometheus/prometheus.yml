global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: desofs-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['app:9090']

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']
