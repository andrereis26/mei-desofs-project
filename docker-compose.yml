services:
  db:
    image: postgres:15-alpine
    container_name: desofs-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-rate-limit:
    image: redis:7-alpine
    container_name: desofs-redis-rate-limit
    command:
      [
        "redis-server",
        "--requirepass",
        "$RATE_LIMIT_REDIS_PASSWORD",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--save",
        "900",
        "1"
      ] # saves to disk if at least 1 write occurred within 900 seconds
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "$RATE_LIMIT_REDIS_PASSWORD", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_rate_limit_data:/data

  redis-token-revocation:
    image: redis:7-alpine
    container_name: desofs-redis-revocation
    command:
      [
        "redis-server",
        "--requirepass",
        "$TOKEN_REVOCATION_REDIS_PASSWORD",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--save",
        "900",
        "1"
      ] # Enable persistence with AOF and periodic snapshots for durability, saves every 900 seconds (15 minutes) if there are changes
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "$TOKEN_REVOCATION_REDIS_PASSWORD", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_token_revocation_data:/data

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: desofs-api
    depends_on:
      db:
        condition: service_healthy
      redis-rate-limit:
        condition: service_healthy
      redis-token-revocation:
        condition: service_healthy
    env_file:
      - ./.env
    ports:
      - "8080:8080"
    volumes:
      - file_storage:/app/storage

volumes:
  postgres_data:
  file_storage:
  redis_rate_limit_data:
  redis_token_revocation_data:
